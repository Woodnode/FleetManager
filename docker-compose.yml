services:

  # ── SQL Server ─────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fleetmanager-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "FleetManager@2024!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "FleetManager@2024!" -Q "SELECT 1" -No -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetmanager-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;
        Database=FleetManagerDb;
        User Id=sa;
        Password=FleetManager@2024!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
      JwtSettings__Secret: "FleetManager_JWT_Secret_Key_MinLength_32_Chars!"
      JwtSettings__ExpiryMinutes: "60"
      JwtSettings__Issuer: "FleetManagerApi"
      JwtSettings__Audience: "FleetManagerClient"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
